[capital]
total_usd = 100.0
max_flash_bet_usd = 5.0
max_standard_bet_usd = 10.0
max_total_exposure_usd = 40.0
daily_loss_limit_usd = 15.0

[standard]
enabled = true
min_consensus_score = 68
min_volume_usd = 1000.0
min_yes_price = 0.10
max_yes_price = 0.45
max_hours_to_resolve = 6.0
high_certainty_score = 85
high_certainty_max_hours = 24.0

[filters]
# flash_min_volume_usd removed (flash strategy dead as of Feb 18, 2026)
standard_min_volume_usd = 1000.0
standard_min_yes_price = 0.10
standard_max_yes_price = 0.45
gamma_poll_interval_secs = 60

[network]
clob_url = "https://clob.polymarket.com"
gamma_url = "https://gamma-api.polymarket.com"
rtds_url = "wss://ws-live-data.polymarket.com"
clob_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
binance_ws_url = "wss://stream.binance.com:9443/ws/btcusdt@kline_1s"
geoblock_url = "https://polymarket.com/api/geoblock"
data_api_url = "https://data-api.polymarket.com"
rtds_ping_interval_secs = 5

[kelly]
max_fraction = 0.15
min_bet_usd = 1.00
flash_category_mult = 1.1         # kept for backward compat — not used in trading
standard_category_mult = 0.9
political_category_mult = 0.7

[regime]
volatile_threshold_pct = 1.0
breaking_volume_multiplier = 3.0
flash_pause_on_breaking_secs = 60

[exit]
profit_lock_threshold = 0.40
trailing_stop_reversal = 0.15
groq_rescore_interval_secs = 60
losing_exit_threshold = 0.20

[ai]
groq_model = "llama-4-scout-17b-16e-instruct"
groq_min_score = 55
claude_model = "claude-sonnet-4-20250514"
consensus_min_score = 68
consensus_groq_weight = 0.4
consensus_claude_weight = 0.6

[maker]
enabled = true
target_spread_pct = 0.025             # 2.5 cents spread to start
max_imbalance_shares = 15.0           # flatten inventory if imbalance > 15 shares
cancel_before_resolution_secs = 10    # cancel all maker orders at T-10s (hard rule)
replace_loop_ms = 80                  # cancel/replace loop target in milliseconds
min_market_volume_usd = 10000.0       # only make markets with >$10K volume
max_per_side_usd = 5.0                # max $5 per YES or NO quote
skip_probability_min = 0.35           # skip high-fee zone low bound
skip_probability_max = 0.65           # skip high-fee zone high bound
volatility_spread_mult = 1.8          # widen spread when volatility > 0.5%
low_time_spread_mult_60s = 1.5        # widen when <60s to resolution
low_time_spread_mult_30s = 2.5        # widen further when <30s to resolution

[arb]
enabled = false               # ALERT-ONLY mode until 10 opportunities validated manually
min_locked_profit = 0.08      # minimum 8 cents per dollar locked profit
min_market_volume = 5000.0    # both legs must have >$5K volume
max_position_usd = 20.0       # max $20 per arb pair
kalshi_poll_interval_secs = 60
