[capital]
total_usd = 100.0
max_flash_bet_usd = 5.0
max_standard_bet_usd = 10.0
max_total_exposure_usd = 40.0
daily_loss_limit_usd = 15.0

[signal]
flash_divergence_threshold_pct = 0.3
flash_min_time_to_resolve_secs = 30
flash_max_time_to_resolve_secs = 120
standard_min_certainty = 70
standard_high_certainty = 85
standard_max_hours_to_resolve = 6.0
standard_high_certainty_max_hours = 24.0

[filters]
flash_min_volume_usd = 500.0
standard_min_volume_usd = 1000.0
standard_min_yes_price = 0.10
standard_max_yes_price = 0.45
gamma_poll_interval_secs = 60

[network]
clob_url = "https://clob.polymarket.com"
gamma_url = "https://gamma-api.polymarket.com"
rtds_url = "wss://ws-live-data.polymarket.com"
clob_ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/market"
binance_ws_url = "wss://stream.binance.com:9443/ws/btcusdt@kline_1s"
geoblock_url = "https://polymarket.com/api/geoblock"
rtds_ping_interval_secs = 5

[kelly]
max_fraction = 0.15       # never bet more than 15% of bankroll per trade
min_bet_usd = 1.00
flash_category_mult = 1.1
standard_category_mult = 0.9
political_category_mult = 0.7

[regime]
volatile_threshold_pct = 1.0     # price swing % in 5min to trigger VOLATILE
breaking_volume_multiplier = 3.0  # volume spike ratio to trigger BREAKING
flash_pause_on_breaking_secs = 60

[exit]
profit_lock_threshold = 0.40    # activate trailing stop after 40% of max profit
trailing_stop_reversal = 0.15   # exit if price reverses 15% from peak
groq_rescore_interval_secs = 60 # how often to re-score open positions
losing_exit_threshold = 0.20    # exit losing position if <5min and >20% down

[ai]
groq_model = "llama-4-scout-17b-16e-instruct"
groq_min_score = 55             # minimum Groq score to even call Claude
claude_model = "claude-sonnet-4-20250514"
consensus_min_score = 68        # minimum combined score to trade
consensus_groq_weight = 0.4
consensus_claude_weight = 0.6
